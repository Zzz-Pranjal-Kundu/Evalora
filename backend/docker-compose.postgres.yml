name: epfms-postgres

services:
  postgres:
    image: postgres:16-alpine
    container_name: epfms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: epfms
      POSTGRES_PASSWORD: epfms
      POSTGRES_DB: epfms
    ports:
      - "5432:5432"
    volumes:
      - epfms_pgdata:/var/lib/postgresql/data

volumes:
  epfms_pgdata:
